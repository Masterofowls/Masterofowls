<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shtarkman Daniel GitHub stats">
  <style>
    .bg { fill: #0D1117; }
    .title { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #00D9FF; }
    .stat { font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #FFFFFF; }
    .value { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #00D9FF; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  </style>
  <rect x="0.5" y="0.5" width="494" height="194" rx="10" class="bg" />
  <text x="25" y="40" class="title">Shtarkman Daniel — GitHub Stats</text>
  <line x1="25" y1="52" x2="470" y2="52" stroke="#00D9FF" stroke-opacity="0.35" />
    <g transform="translate(0, 70)" style="animation: fadeIn 0.5s ease-in-out forwards; animation-delay: 300ms; opacity: 0;">
      <text x="25" y="0" class="stat">Total Stars Earned</text>
      <text x="470" y="0" class="value" text-anchor="end">43</text>
    </g>
    <g transform="translate(0, 90)" style="animation: fadeIn 0.5s ease-in-out forwards; animation-delay: 420ms; opacity: 0;">
      <text x="25" y="0" class="stat">Commits (last year)</text>
      <text x="470" y="0" class="value" text-anchor="end">553</text>
    </g>
    <g transform="translate(0, 110)" style="animation: fadeIn 0.5s ease-in-out forwards; animation-delay: 540ms; opacity: 0;">
      <text x="25" y="0" class="stat">Total PRs</text>
      <text x="470" y="0" class="value" text-anchor="end">8</text>
    </g>
    <g transform="translate(0, 130)" style="animation: fadeIn 0.5s ease-in-out forwards; animation-delay: 660ms; opacity: 0;">
      <text x="25" y="0" class="stat">Total Issues</text>
      <text x="470" y="0" class="value" text-anchor="end">1</text>
    </g>
    <g transform="translate(0, 150)" style="animation: fadeIn 0.5s ease-in-out forwards; animation-delay: 780ms; opacity: 0;">
      <text x="25" y="0" class="stat">Followers</text>
      <text x="470" y="0" class="value" text-anchor="end">44</text>
    </g>
    <g transform="translate(0, 170)" style="animation: fadeIn 0.5s ease-in-out forwards; animation-delay: 900ms; opacity: 0;">
      <text x="25" y="0" class="stat">Public Repos</text>
      <text x="470" y="0" class="value" text-anchor="end">139</text>
    </g>
</svg>