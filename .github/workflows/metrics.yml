name: Metrics

on:
  schedule:
    # Regenerate committed stat SVGs twice a day
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    # Avoid re-triggering on the workflow's own committed stat cards
    paths-ignore:
      - 'assets/metrics/**'

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Overview stats card
        uses: lowlighter/metrics@latest
        with:
          # Optional: create a PAT and add it as the METRICS_TOKEN secret for
          # richer data (private contributions). Falls back to the built-in
          # token, which is enough for public profile stats.
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: Masterofowls
          filename: assets/metrics/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow
          committer_message: 'chore(metrics): update overview stats'

      - name: Most-used languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: Masterofowls
          filename: assets/metrics/languages.svg
          base: ''
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          committer_message: 'chore(metrics): update languages'
