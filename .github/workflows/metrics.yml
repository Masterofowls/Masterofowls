name: Metrics

on:
  schedule:
    # Regenerate committed stat SVGs twice a day
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    # Avoid re-triggering on the workflow's own committed stat cards
    paths-ignore:
      - 'assets/metrics/**'

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate stat cards (self-hosted, no external render service)
        env:
          # Built-in token is enough for public profile stats.
          GH_TOKEN: ${{ github.token }}
          STATS_USER: ${{ github.repository_owner }}
        run: node scripts/generate-stats.mjs

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/metrics/metrics.svg assets/metrics/languages.svg
          git diff --staged --quiet || git commit -m "chore(metrics): update stat cards"
          git push
